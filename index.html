<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Digest</title>
<style>
  :root {
    --bg: #faf8f5;
    --card-bg: #ffffff;
    --ink: #1a1a1a;
    --ink-soft: #6b6b6b;
    --accent: #c1492d;
    --border: #e8e3dc;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }
  header {
    padding: 48px 24px 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: var(--card-bg);
  }
  header h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 2.4rem;
    margin: 0 0 8px;
    letter-spacing: -0.02em;
  }
  header p {
    color: var(--ink-soft);
    font-size: 0.9rem;
    margin: 0;
  }
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }
  .category {
    margin-bottom: 48px;
  }
  .category-title {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 1.4rem;
    border-bottom: 2px solid var(--accent);
    display: inline-block;
    padding-bottom: 6px;
    margin-bottom: 20px;
  }
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    text-decoration: none;
    color: inherit;
    box-shadow: var(--shadow);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  }
  .card-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .card-date {
    color: var(--ink-soft);
    font-weight: 400;
    text-transform: none;
  }
  .card-title {
    font-size: 1.05rem;
    margin: 0 0 8px;
    line-height: 1.3;
  }
  .card-summary {
    font-size: 0.88rem;
    color: var(--ink-soft);
    margin: 0;
    flex-grow: 1;
  }
  .empty {
    text-align: center;
    color: var(--ink-soft);
    padding: 80px 0;
  }
  footer {
    text-align: center;
    padding: 24px;
    color: var(--ink-soft);
    font-size: 0.8rem;
  }
</style>
</head>
<body>
<header>
  <h1>Daily Digest</h1>
  <p>Generated June 30, 2026 at 14:34 UTC · last 2 days</p>
</header>
<main>
<p class="empty">No recent entries found. Check back soon.</p>
</main>
<footer>Auto-generated by GitHub Actions</footer>
</body>
</html>
